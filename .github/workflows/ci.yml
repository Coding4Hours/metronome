name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Conventional Changelog Action
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          
  build:
      name: Build APK
      needs: changelog
      runs-on: ubuntu-latest
      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
  
        - name: Setup Bun
          uses: oven-sh/setup-bun@v2
          with:
            bun-version: latest
  
        - name: Install Java
          uses: actions/setup-java@v4
          with:
            distribution: 'zulu'
            java-version: '17'
  
        - name: Install Android SDK
          uses: android-actions/setup-android@v3
  
        - name: Install NDK and Build Tools
          run: |
            sdkmanager "ndk;26.1.10909125" "build-tools;34.0.0"
            # Modern way to update path without set-output style warnings
            echo "${ANDROID_HOME}/build-tools/34.0.0" >> $GITHUB_PATH
  
        - name: Install Rust toolchain
          uses: dtolnay/rust-toolchain@stable
          with:
            targets: aarch64-linux-android
  
        - name: Rust Cache
          uses: swatinem/rust-cache@v2
          with:
            workspaces: src-tauri -> target
  
        - name: Install Dependencies
          run: bun install
  
        - name: Build Unsigned APK
          run: bun tauri android build --apk --target aarch64
          env:
            NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
  
        - name: Sign APK
          uses: r0adkll/sign-android-release@v1
          id: sign_app
          with:
            releaseDirectory: src-tauri/gen/android/app/build/outputs/apk/universal/release
            signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
            alias: ${{ secrets.ANDROID_KEY_ALIAS }}
            keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
            keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          env:
            ANDROID_HOME: ${{ env.ANDROID_HOME }}
            ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
            BUILD_TOOLS_VERSION: "34.0.0"
  
        - name: Upload Signed APK
          uses: actions/upload-artifact@v4
          with:
            name: android-apk
            path: ${{ steps.sign_app.outputs.signedReleaseFile }}
